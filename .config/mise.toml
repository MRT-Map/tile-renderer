[tools]
python = "3.14.5"
"pipx:hatch" = { version = "1.17.0", uvx_args = "--with pip" }
uv = "0.11.18"

cargo-binstall = "1.19.1"
"cargo:resvg" = "0.47.0"
"cargo:usvg" = "0.47.0"

[env]
HATCH_ENV_TYPE_VIRTUAL_UV_PATH = { tools = true, value = "{{ exec(command=mise_bin ~ ' which uv') }}" }

[settings]
minimum_release_age = "3d"