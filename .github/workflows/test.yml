name: Test
on:
  push:
    branches: ["**"]
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      matrix:
        zoom: ["1", "2 3 4", "5 6 7 8 9"]
        runner: ["ubuntu-latest", "macos-latest", "windows-latest", "ubuntu-24.04-arm"]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/mise
        with:
          envs: ""

      - run: hatch run python tests/test_render.py png ${{ matrix.zoom }}
