name: Test
on:
  push:
    branches: ["**"]
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        zoom: ["1", "2 3 4", "5 6 7 8 9"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/mise
        with:
          envs: ""

      - run: hatch run python tests/test_render.py png ${{ matrix.zoom }}
