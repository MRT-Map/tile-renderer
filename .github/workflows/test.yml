name: Test
on:
  push:
    branches: ["**"]
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        zoom: [1, 2, 3, 4, 5, 6, 7, 8, 9]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: ./.github/actions/mise
        with:
          envs: ""

      - run: hatch run python tests/test_render.py png ${{ matrix.zoom }}
