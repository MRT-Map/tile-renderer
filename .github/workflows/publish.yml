name: Publish
on:
  workflow_dispatch:
  push:
    tags: ["**"]

jobs:
  test:
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  build:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      changelog: ${{ steps.release-info.outputs.changelog }}
      version: ${{ steps.release-info.outputs.version }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/mise
        with:
          cache: false
          envs: ""
      - run: hatch build

      - id: release-info
        run: |
          {
          echo 'changelog<<__EOF__'
          hatch run python -c "
          from tile_renderer.__about__ import __version__
          print('\n'.join(open('CHANGELOG.md').read().split('## v'+__version__)[1].split('\n')[1:]).split('\n##')[0])
          "
          echo __EOF__
          } >> "$GITHUB_OUTPUT"

          hatch run python -c "
          from tile_renderer.__about__ import __version__
          print('version=v'+__version__)
          " >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-pypi
          path: dist

      - run: |
          hatch run python -c "
          from tile_renderer.skin import Skin
          from pathlib import Path
          Skin.default().save_json(Path.cwd() / 'dist')
          "
          hatch run python -c "
          import json
          from pathlib import Path
          j = json.loads((Path.cwd() / 'dist' / 'default.skin.json').read_text())
          j['font_files'] = []
          (Path.cwd() / 'dist' / 'default.nofontfiles.skin.json').write_text(json.dumps(j))
          "
      - run: |
          hatch run tile-renderer schema pla2 > dist/pla2.schema.json
          hatch run tile-renderer schema skin > dist/skin.schema.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-github
          path: dist

  github-release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-github
          path: dist
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2 # zizmor: ignore[superfluous-actions]
        with:
          tag_name: ${{ needs.build.outputs.version }}
          body: ${{ needs.build.outputs.changelog }}
          files: dist/*

  delete-github-release:
    runs-on: ubuntu-latest
    needs: [ test, build, github-release ]
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - run: gh release delete "$TAG" --cleanup-tag -y
        env:
          TAG: ${{ needs.build.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true

  pypi:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/tile-renderer
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist-pypi
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
